name: C# Tests

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

env:
  DOTNET_NOLOGO: true
  DOTNET_CLI_TELEMETRY_OPTOUT: true

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Checkout AL Runner
        uses: actions/checkout@v4
        with:
          repository: StefanMaron/BusinessCentral.AL.Runner
          path: BusinessCentral.AL.Runner

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Build
        run: |
          dotnet build AlMutate/AlMutate.slnx \
            -p:ALRunnerProjectPath=$GITHUB_WORKSPACE/BusinessCentral.AL.Runner/AlRunner/AlRunner.csproj

      - name: Run C# tests
        run: |
          dotnet test AlMutate/AlMutate.Tests/AlMutate.Tests.csproj \
            -p:ALRunnerProjectPath=$GITHUB_WORKSPACE/BusinessCentral.AL.Runner/AlRunner/AlRunner.csproj \
            --no-build \
            --filter "Category!=Integration" \
            --verbosity minimal
