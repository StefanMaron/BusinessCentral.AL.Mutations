name: Build and Test

on:
  push:
    branches: [master]
    paths:
      - 'al_mutate/**'
      - 'tests/**'
      - 'operators/**'
      - 'pyproject.toml'
      - '.github/workflows/build.yml'
  pull_request:
    branches: [master]
    paths:
      - 'al_mutate/**'
      - 'tests/**'
      - 'operators/**'
      - 'pyproject.toml'
      - '.github/workflows/build.yml'
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Run tests
        run: pytest -v --tb=short
